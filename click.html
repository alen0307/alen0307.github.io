<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百年点击统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
            justify-content: flex-start;
        }

        .main-button {
            width: 90vw;
            flex: 1 1 auto;
            min-height: 300px;
            margin-bottom: 30px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .main-button.click-green {
            background: linear-gradient(145deg, #2ecc71, #27ae60) !important;
            animation: colorSwitch 0.3s ease;
        }

        @keyframes colorSwitch {
            0% { background: linear-gradient(145deg, #ff6b6b, #ee5a24); }
            50% { background: linear-gradient(145deg, #2ecc71, #27ae60); }
            100% { background: linear-gradient(145deg, #ff6b6b, #ee5a24); }
        }

        .main-button:active {
            transform: scale(0.98);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .main-button {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .click-count {
            font-size: 8rem;
            margin: 10px 0;
        }

        .click-label {
            font-size: 2rem;
            opacity: 0.9;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            opacity: 0.8;
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 50%, transparent 70%);
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-button {
            padding: 15px 25px;
            background: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .control-button.primary {
            background: #4ecdc4;
            color: white;
        }

        .control-button.secondary {
            background: #95e1d3;
            color: #333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 95%;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            padding: 5px;
        }

        .stats-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #666;
        }

        .stat-value {
            font-weight: bold;
            color: #333;
        }

        .chart-container {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 200px;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .data-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .data-button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .data-button.import {
            background: #3498db;
            color: white;
        }

        .data-button.export {
            background: #2ecc71;
            color: white;
        }

        .data-button.clear {
            background: #e74c3c;
            color: white;
        }

        .file-input {
            display: none;
        }

        @media (max-width: 768px) {
            .main-button {
                width: 95vw;
                height: 45vh;
                min-height: 250px;
            }
            
            .click-count {
                font-size: 5rem;
            }
            
            .modal-content {
                margin: 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="main-button" id="mainButton">
        <div class="click-label">今日点击</div>
        <div class="timer" id="timer">00:00:00</div>
        <div class="click-count" id="todayCount">0</div>
        <div class="click-label">次</div>
    </button>

    <div class="control-buttons">
        <button class="control-button primary" id="analyzeButton">分析</button>
        <button class="control-button secondary" id="exportButton">导出</button>
    </div>

    <div class="modal" id="analyzeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">点击统计分析</h2>
                <button class="close-button" id="closeAnalyze">&times;</button>
            </div>
            
            <div class="stats-summary">
                <div class="stat-item">
                    <span class="stat-label">总点击次数</span>
                    <span class="stat-value" id="totalClicks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">平均每日点击</span>
                    <span class="stat-value" id="avgDaily">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">最高单日点击</span>
                    <span class="stat-value" id="maxDaily">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">记录天数</span>
                    <span class="stat-value" id="recordDays">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">数据大小</span>
                    <span class="stat-value" id="dataSize">0 KB</span>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">最近24小时点击统计（北京时间）</div>
                <div class="chart-wrapper">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">最近7天点击统计（北京时间）</div>
                <div class="chart-wrapper">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">最近7周点击统计（北京时间）</div>
                <div class="chart-wrapper">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">最近7月点击统计（北京时间）</div>
                <div class="chart-wrapper">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div class="data-controls">
                <button class="data-button export" id="modalExportButton">导出数据</button>
                <button class="data-button clear" id="clearDataButton">清空数据</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        class SimpleChart {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
            }

            drawBarChart(labels, data, color = '#4CAF50') {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                const padding = 40;
                const chartWidth = this.canvas.width - padding * 2;
                const chartHeight = this.canvas.height - padding * 2;

                if (data.length === 0) return;

                const maxValue = Math.max(...data);
                const barWidth = chartWidth / labels.length;

                // 清空画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制坐标轴
                this.ctx.strokeStyle = '#ddd';
                this.ctx.lineWidth = 1;
                this.ctx.beginPath();
                this.ctx.moveTo(padding, padding);
                this.ctx.lineTo(padding, this.canvas.height - padding);
                this.ctx.lineTo(this.canvas.width - padding, this.canvas.height - padding);
                this.ctx.stroke();

                // 绘制柱状图
                data.forEach((value, index) => {
                    const barHeight = (value / maxValue) * chartHeight;
                    const x = padding + index * barWidth;
                    const y = this.canvas.height - padding - barHeight;

                    // 绘制柱子
                    this.ctx.fillStyle = color;
                    this.ctx.fillRect(x + barWidth * 0.1, y, barWidth * 0.8, barHeight);

                    // 绘制数值
                    if (value > 0) {
                        this.ctx.fillStyle = '#333';
                        this.ctx.font = '12px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(value, x + barWidth / 2, y - 5);
                    }

                    // 绘制标签
                    if (labels.length <= 24) {
                        this.ctx.save();
                        this.ctx.translate(x + barWidth / 2, this.canvas.height - padding + 15);
                        this.ctx.rotate(-Math.PI / 4);
                        this.ctx.fillStyle = '#666';
                        this.ctx.font = '10px Arial';
                        this.ctx.textAlign = 'right';
                        this.ctx.fillText(labels[index], 0, 0);
                        this.ctx.restore();
                    }
                });
            }
        }

        class ClickTracker {
            constructor() {
                this.data = null;
                this.charts = {};
                this.startTime = Date.now();
                this.init();
            }

            async init() {
                await this.loadData();
                this.bindEvents();
                this.updateTodayCount();
                this.startNewDayCheck();
                this.startTimer();
            }

            async loadData() {
                try {
                    const snapshot = await db.ref('clickData').once('value');
                    const data = snapshot.val();
                    if (data) {
                        this.data = data;
                        console.log('Loaded from Firebase, lastDate:', this.data.lastDate);
                    } else {
                        throw new Error('No data');
                    }
                } catch (error) {
                    console.log('No data, starting fresh');
                    const now = new Date();
                    this.data = {
                        clicks: {},
                        startDate: now.toISOString(),
                        lastDate: this.getDateString(now)
                    };
                }
            }

            async saveData() {
                try {
                    await db.ref('clickData').set(this.data);
                } catch (error) {
                    console.error('Save failed:', error);
                }
            }

            getBeijingTime(date = new Date()) {
                const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
                return new Date(utc + (8 * 3600000));
            }

            getDateString(date = new Date()) {
                const bjTime = this.getBeijingTime(date);
                return bjTime.toISOString().split('T')[0];
            }

            getHourString(date = new Date()) {
                const bjTime = this.getBeijingTime(date);
                return bjTime.toISOString().slice(0, 13);
            }

            getWeekString(date = new Date()) {
                const bjTime = this.getBeijingTime(date);
                const year = bjTime.getFullYear();
                const week = this.getWeekNumber(bjTime);
                return `${year}-W${week.toString().padStart(2, '0')}`;
            }

            getMonthString(date = new Date()) {
                const bjTime = this.getBeijingTime(date);
                return bjTime.toISOString().slice(0, 7);
            }

            getWeekNumber(date) {
                const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
                return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            }

            recordClick(touchX = null, touchY = null) {
                const now = new Date();
                const dateStr = this.getDateString(now);
                const hourStr = this.getHourString(now);
                const weekStr = this.getWeekString(now);
                const monthStr = this.getMonthString(now);

                if (!this.data.clicks[dateStr]) {
                    this.data.clicks[dateStr] = {
                        total: 0,
                        hours: {},
                        week: weekStr,
                        month: monthStr
                    };
                }

                this.data.clicks[dateStr].total++;
                
                if (!this.data.clicks[dateStr].hours[hourStr]) {
                    this.data.clicks[dateStr].hours[hourStr] = 0;
                }
                this.data.clicks[dateStr].hours[hourStr]++;

                this.data.lastDate = dateStr;
                this.saveData();
                this.updateTodayCount();
                this.addRippleEffect(touchX, touchY);
                this.addColorSwitchEffect();
            }

            updateTodayCount() {
                const today = this.getDateString();
                const count = this.data.clicks[today]?.total || 0;
                document.getElementById('todayCount').textContent = count;
            }

            addRippleEffect(touchX = null, touchY = null) {
                const button = document.getElementById('mainButton');
                
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                
                if (touchX !== null && touchY !== null) {
                    ripple.style.left = touchX + 'px';
                    ripple.style.top = touchY + 'px';
                } else {
                    const randomX = Math.random() * button.offsetWidth;
                    const randomY = Math.random() * button.offsetHeight;
                    ripple.style.left = randomX + 'px';
                    ripple.style.top = randomY + 'px';
                }
                
                button.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }

            addColorSwitchEffect() {
                const button = document.getElementById('mainButton');
                button.classList.add('click-green');
                
                setTimeout(() => {
                    button.classList.remove('click-green');
                }, 300);
            }

            startNewDayCheck() {
                setTimeout(() => {
                    const current = this.getDateString();
                    if (this.data.lastDate !== current) {
                        this.updateTodayCount();
                    }
                    this.startNewDayCheck();
                }, 60000);
            }

            startTimer() {
                setTimeout(() => {
                    this.updateTimer();
                    this.startTimer();
                }, 1000);
            }

            updateTimer() {
                const elapsed = Date.now() - this.startTime;
                const hours = Math.floor(elapsed / 3600000);
                const minutes = Math.floor((elapsed % 3600000) / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                
                const timeString = 
                    hours.toString().padStart(2, '0') + ':' +
                    minutes.toString().padStart(2, '0') + ':' +
                    seconds.toString().padStart(2, '0');
                
                document.getElementById('timer').textContent = timeString;
            }

            getHourlyData() {
                const data = [];
                const labels = [];
                const now = new Date();
                
                for (let i = 23; i >= 0; i--) {
                    const hour = new Date(now.getTime() - i * 60 * 60 * 1000);
                    const bjTime = this.getBeijingTime(hour);
                    const hourStr = this.getHourString(hour);
                    const dateStr = this.getDateString(hour);
                    
                    let count = 0;
                    if (this.data.clicks[dateStr] && this.data.clicks[dateStr].hours[hourStr]) {
                        count = this.data.clicks[dateStr].hours[hourStr];
                    }
                    
                    data.push(count);
                    labels.push(bjTime.getHours() + ':00');
                }
                
                return { labels, data };
            }

            getDailyData() {
                const data = [];
                const labels = [];
                const now = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const day = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                    const bjTime = this.getBeijingTime(day);
                    const dateStr = this.getDateString(day);
                    
                    let count = 0;
                    if (this.data.clicks[dateStr]) {
                        count = this.data.clicks[dateStr].total;
                    }
                    
                    data.push(count);
                    labels.push((bjTime.getMonth() + 1) + '/' + bjTime.getDate());
                }
                
                return { labels, data };
            }

            getWeeklyData() {
                const weeklyData = {};
                const now = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const week = new Date(now.getTime() - i * 7 * 24 * 60 * 60 * 1000);
                    const weekStr = this.getWeekString(week);
                    weeklyData[weekStr] = 0;
                }
                
                Object.entries(this.data.clicks).forEach(([dateStr, dayData]) => {
                    if (weeklyData.hasOwnProperty(dayData.week)) {
                        weeklyData[dayData.week] += dayData.total;
                    }
                });
                
                const labels = Object.keys(weeklyData);
                const data = labels.map(label => weeklyData[label]);
                
                return { labels, data };
            }

            getMonthlyData() {
                const monthlyData = {};
                const now = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const month = new Date(now.getFullYear(), now.getMonth() - i + 1, 1);
                    const monthStr = this.getMonthString(month);
                    monthlyData[monthStr] = 0;
                }
                
                Object.values(this.data.clicks).forEach(day => {
                    if (monthlyData.hasOwnProperty(day.month)) {
                        monthlyData[day.month] += day.total;
                    }
                });
                
                const labels = Object.keys(monthlyData);
                const data = labels.map(label => monthlyData[label]);
                
                return { labels, data };
            }

            getStatistics() {
                const total = Object.values(this.data.clicks).reduce((sum, day) => sum + day.total, 0);
                const days = Object.keys(this.data.clicks).length;
                const avg = days > 0 ? Math.round(total / days) : 0;
                const max = Math.max(0, ...Object.values(this.data.clicks).map(day => day.total));
                
                const dataSize = this.calculateDataSize();
                
                return {
                    total,
                    avgDaily: avg,
                    maxDaily: max,
                    recordDays: days,
                    dataSize
                };
            }

            calculateDataSize() {
                const dataStr = JSON.stringify(this.data);
                const bytes = new Blob([dataStr]).size;
                const kb = (bytes / 1024).toFixed(2);
                return kb + ' KB';
            }

            showAnalysis() {
                const modal = document.getElementById('analyzeModal');
                modal.style.display = 'block';
                
                const stats = this.getStatistics();
                document.getElementById('totalClicks').textContent = stats.total.toLocaleString();
                document.getElementById('avgDaily').textContent = stats.avgDaily.toLocaleString();
                document.getElementById('maxDaily').textContent = stats.maxDaily.toLocaleString();
                document.getElementById('recordDays').textContent = stats.recordDays;
                document.getElementById('dataSize').textContent = stats.dataSize;
                
                setTimeout(() => this.createCharts(), 100);
            }

            createCharts() {
                const hourlyData = this.getHourlyData();
                const dailyData = this.getDailyData();
                const weeklyData = this.getWeeklyData();
                const monthlyData = this.getMonthlyData();

                this.charts.hourly = new SimpleChart('hourlyChart');
                this.charts.daily = new SimpleChart('dailyChart');
                this.charts.weekly = new SimpleChart('weeklyChart');
                this.charts.monthly = new SimpleChart('monthlyChart');

                this.charts.hourly.drawBarChart(hourlyData.labels, hourlyData.data, '#FF6384');
                this.charts.daily.drawBarChart(dailyData.labels, dailyData.data, '#36A2EB');
                this.charts.weekly.drawBarChart(weeklyData.labels, weeklyData.data, '#FFCE56');
                this.charts.monthly.drawBarChart(monthlyData.labels, monthlyData.data, '#4BC0C0');
            }

            exportData() {
                const exportData = {
                    version: '2.0',
                    exportDate: new Date().toISOString(),
                    data: this.data
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], {
                    type: 'application/json'
                });
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `click-tracker-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            importData(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importData = JSON.parse(e.target.result);
                        
                        if (importData.data && importData.data.clicks) {
                            this.data = importData.data;
                            this.saveData();
                            this.updateTodayCount();
                            
                            if (document.getElementById('analyzeModal').style.display === 'block') {
                                this.showAnalysis();
                            }
                            
                            alert('数据导入成功！');
                        } else {
                            alert('无效的数据格式！');
                        }
                    } catch (error) {
                        alert('导入失败：' + error.message);
                    }
                };
                reader.readAsText(file);
            }

            clearData() {
                if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                    const now = new Date();
                    this.data = {
                        clicks: {},
                        startDate: now.toISOString(),
                        lastDate: this.getDateString(now)
                    };
                    this.saveData();
                    this.updateTodayCount();
                    this.charts = {};
                    
                    const stats = this.getStatistics();
                    document.getElementById('totalClicks').textContent = '0';
                    document.getElementById('avgDaily').textContent = '0';
                    document.getElementById('maxDaily').textContent = '0';
                    document.getElementById('recordDays').textContent = '0';
                    
                    alert('数据已清空！');
                }
            }

            bindEvents() {
                const mainButton = document.getElementById('mainButton');
                
                mainButton.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = mainButton.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    this.recordClick(x, y);
                });
                
                mainButton.addEventListener('click', (e) => {
                    if (!('ontouchstart' in window)) {
                        const rect = mainButton.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        this.recordClick(x, y);
                    }
                });

                document.getElementById('analyzeButton').addEventListener('click', () => {
                    this.showAnalysis();
                });

                document.getElementById('closeAnalyze').addEventListener('click', () => {
                    document.getElementById('analyzeModal').style.display = 'none';
                    this.charts = {};
                });

                document.getElementById('exportButton').addEventListener('click', () => {
                    this.exportData();
                });

                document.getElementById('modalExportButton').addEventListener('click', () => {
                    this.exportData();
                });

                document.getElementById('clearDataButton').addEventListener('click', () => {
                    this.clearData();
                });

                window.addEventListener('click', (e) => {
                    const modal = document.getElementById('analyzeModal');
                    if (e.target === modal) {
                        modal.style.display = 'none';
                        this.charts = {};
                    }
                });
            }
        }

        const tracker = new ClickTracker();
    </script>
</body>
</html>
